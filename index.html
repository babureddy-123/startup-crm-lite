<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Startup CRM Lite</title>
    <!-- Inject blocking inline script to load theme before parsing DOM, avoiding light/dark flash -->
    <script>
      (function() {
        try {
          var mode = localStorage.getItem('startup-crm-theme-mode');
          var isDark = false;
          if (mode) {
            if (mode === 'dark') {
              isDark = true;
            } else if (mode === 'system') {
              isDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
            }
          } else {
            var legacy = localStorage.getItem('startup-crm-theme');
            if (legacy === 'true' || (legacy === null && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
              isDark = true;
            }
          }
          if (isDark) {
            document.documentElement.classList.add('dark');
          } else {
            document.documentElement.classList.remove('dark');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
